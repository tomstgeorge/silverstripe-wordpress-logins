---
Name: tomstgeorge-silverstripe-wordpress-logins
Before: '#modelascontrollercatchallroute'
---
SilverStripe\Security\MemberAuthenticator\LoginHandler:
  extensions:
    - TomStGeorge\SilverStripeWordpressLogins\Extension\LoginHandlerExtension

SilverStripe\Security\Member:
  extensions:
    - TomStGeorge\SilverStripeWordpressLogins\Extension\MemberPasswordSyncExtension

SilverStripe\Control\Director:
  rules:
    'silverstripe-auth': 'TomStGeorge\SilverStripeWordpressLogins\Controller\AuthController'
    'silverstripe-auth/$Action': 'TomStGeorge\SilverStripeWordpressLogins\Controller\AuthController'
    'silverstripe-auto-login': 'TomStGeorge\SilverStripeWordpressLogins\Controller\AutoLoginController'

